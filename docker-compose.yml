# Local dev with hot reload. Backend reruns on change (node --watch); frontend is Vite's
# dev server proxying /api to the backend. For prod parity instead, `docker build .`.
services:
  backend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && node --watch --disable-warning=ExperimentalWarning backend/server.ts"
    environment:
      - PORT=3000
      - DATA_DIR=/data
    volumes:
      - ./:/app
      - data:/data
    ports:
      - "3000:3000"

  frontend:
    image: node:24-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./:/app
    ports:
      - "5173:5173"

volumes:
  data:
